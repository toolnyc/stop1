name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if no package.json (doc-only or CI-only PRs before Issue #1)
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # TODO Issue #1: Add smoke test step here.
      # Use `pnpm dev` (not `pnpm preview` — @astrojs/vercel doesn't support astro preview).
      # Background the dev server, sleep 5, then run curl checks from the issue's Verification section.
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}
      SUPABASE_SECRET_KEY: placeholder
      COOKIE_SECRET: placeholder-32-char-string-here
      STRIPE_SECRET_KEY: sk_test_placeholder
      PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      RESEND_API_KEY: re_placeholder
      EMAIL_FROM: noreply@example.com
      BLOB_READ_WRITE_TOKEN: placeholder
