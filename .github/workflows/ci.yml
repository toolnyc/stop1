name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Smoke test
        run: |
          pnpm preview &
          SERVER_PID=$!
          sleep 5
          # Verify server is up and key pages respond
          curl -sf http://localhost:4321/ -o /dev/null || (echo "FAIL: homepage" && kill $SERVER_PID && exit 1)
          curl -sf http://localhost:4321/admin/login -o /dev/null || (echo "FAIL: /admin/login" && kill $SERVER_PID && exit 1)
          echo "PASS: smoke test"
          kill $SERVER_PID
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}
      SUPABASE_SECRET_KEY: placeholder
      COOKIE_SECRET: placeholder-32-char-string-here
      STRIPE_SECRET_KEY: sk_test_placeholder
      PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      RESEND_API_KEY: re_placeholder
      EMAIL_FROM: noreply@example.com
      BLOB_READ_WRITE_TOKEN: placeholder
