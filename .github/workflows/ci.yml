name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Smoke test
        run: |
          pnpm dev &
          # Wait up to 30s for server to be ready
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/ | grep -q "200" && break
            sleep 1
          done
          # Issue #1: homepage responds 200
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4321/)
          echo "GET / -> $STATUS"
          [ "$STATUS" = "200" ] || (echo "FAIL: expected 200, got $STATUS" && exit 1)
    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}
      SUPABASE_SECRET_KEY: placeholder
      COOKIE_SECRET: placeholder-32-char-string-here
      STRIPE_SECRET_KEY: sk_test_placeholder
      PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      RESEND_API_KEY: re_placeholder
      EMAIL_FROM: noreply@example.com
      BLOB_READ_WRITE_TOKEN: placeholder
